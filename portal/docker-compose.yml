services:
  postgres:
    image: postgres:16-alpine
    container_name: portal_postgres
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal_db
    ports:
      - "5432:5432"
    volumes:
      - portal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  portal_pg_data:
